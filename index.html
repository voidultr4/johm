<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Johm's social links and contact page.">
  <title>Johm | Void</title>
  <link rel="preconnect" href="https://cdnjs.cloudflare.com">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --glow-red: #ff1f44;
      --dark-bg: #050507;
      --card-bg: rgba(13, 13, 17, 0.7);
      --border-color: rgba(255, 31, 68, 0.2);
      --text-color: #ffffff;
      --text-dim: #8b8b9a;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: var(--dark-bg);
      color: var(--text-color);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow-x: hidden;
      position: relative;
      padding: 20px;
      font-family: "Courier New", Courier, monospace;
    }

    body::before {
      content: "";
      display: block;
      position: fixed;
      inset: 0;
      background:
        linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%),
        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
      z-index: 1;
      background-size: 100% 2px, 3px 100%;
      pointer-events: none;
    }

    .container {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 500px;
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 40px 30px;
      backdrop-filter: blur(12px);
      text-align: center;
      box-shadow: 0 0 40px rgba(255, 31, 68, 0.05);
      transition: border 0.5s ease, box-shadow 0.5s ease;
    }

    .container:hover {
      border-color: rgba(255, 31, 68, 0.5);
      box-shadow: 0 0 50px rgba(255, 31, 68, 0.15);
    }

    .avatar {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      background: #0d0d11;
      border: 2px solid var(--glow-red);
      margin: 0 auto 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.2rem;
      color: var(--text-color);
      font-weight: 700;
      text-shadow: 0 0 10px var(--glow-red);
      box-shadow: 0 0 20px rgba(255, 31, 68, 0.3);
      overflow: hidden;
    }

    .avatar img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
    }

    h1 {
      font-size: 2.2rem;
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-bottom: 6px;
      text-shadow: 0 0 8px rgba(255, 31, 68, 0.6);
    }

    .status {
      font-size: 0.85rem;
      color: var(--text-dim);
      letter-spacing: 2px;
      margin-bottom: 35px;
      text-transform: uppercase;
    }

    .status span {
      color: var(--glow-red);
      animation: blink 1.5s infinite;
    }

    .links-group {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .link-card {
      width: 100%;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 8px;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
      color: var(--text-color);
      transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
      position: relative;
      cursor: pointer;
      font: inherit;
    }

    .link-card i,
    .custom-icon {
      font-size: 1.3rem;
      width: 30px;
      color: var(--text-dim);
      transition: color 0.3s, filter 0.3s;
      flex: 0 0 30px;
    }

    .custom-icon {
      height: 24px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .custom-icon svg {
      width: 26px;
      height: 26px;
      display: block;
      fill: currentColor;
    }

    .link-title {
      flex-grow: 1;
      min-width: 0;
      text-align: left;
      font-size: 0.95rem;
      letter-spacing: 1px;
    }

    .link-value {
      max-width: 48%;
      overflow-wrap: anywhere;
      font-size: 0.85rem;
      color: var(--text-dim);
      background: rgba(0, 0, 0, 0.3);
      padding: 4px 8px;
      border-radius: 4px;
      border: 1px solid rgba(255, 255, 255, 0.03);
    }

    .link-card:hover,
    .link-card:focus-visible {
      outline: none;
      background: rgba(255, 31, 68, 0.04);
      border-color: var(--glow-red);
      transform: scale(1.02);
      box-shadow: 0 0 15px rgba(255, 31, 68, 0.2);
    }

    .link-card:hover i,
    .link-card:focus-visible i,
    .link-card:hover .custom-icon,
    .link-card:focus-visible .custom-icon {
      color: var(--glow-red);
      text-shadow: 0 0 5px var(--glow-red);
      filter: drop-shadow(0 0 5px var(--glow-red));
    }

    .roblox-icon svg {
      width: 28px;
      height: 28px;
    }

    .namemc-icon svg {
      width: 28px;
      height: 28px;
    }

    .toast {
      position: fixed;
      bottom: -70px;
      left: 50%;
      transform: translateX(-50%);
      background: #111116;
      border: 1px solid var(--glow-red);
      color: #fff;
      padding: 12px 24px;
      border-radius: 6px;
      font-size: 0.85rem;
      letter-spacing: 1px;
      z-index: 10;
      transition: bottom 0.3s ease;
      box-shadow: 0 5px 20px rgba(0, 0, 0, 0.6);
    }

    .toast.show {
      bottom: 30px;
    }

    @keyframes blink {
      0%, 100% {
        opacity: 1;
      }

      50% {
        opacity: 0.3;
      }
    }

    footer {
      margin-top: 40px;
      font-size: 0.75rem;
      color: var(--text-dim);
      letter-spacing: 1px;
      line-height: 1.7;
    }

    footer a {
      color: var(--text-color);
      font-weight: 700;
      text-decoration: none;
      text-shadow: 0 0 8px rgba(255, 31, 68, 0.45);
      transition: color 0.3s, text-shadow 0.3s;
    }

    footer a:hover,
    footer a:focus-visible {
      color: var(--glow-red);
      outline: none;
      text-shadow: 0 0 10px var(--glow-red);
    }

    @media (max-width: 420px) {
      .container {
        padding: 32px 18px;
      }

      h1 {
        font-size: 1.9rem;
      }

      .link-card {
        align-items: flex-start;
      }
    }
  </style>
</head>
<body>

  <div id="toast" class="toast" role="status" aria-live="polite">Copied to system!</div>

  <script>
    const toast = document.getElementById("toast");

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add("show");
      window.setTimeout(() => {
        toast.classList.remove("show");
      }, 2500);
    }

    async function copyTag(text, message) {
      try {
        await navigator.clipboard.writeText(text);
        showToast(message);
      } catch {
        showToast(text);
      }
    }

    document.querySelectorAll("[data-copy]").forEach((button) => {
      button.addEventListener("click", () => {
        copyTag(button.dataset.copy, button.dataset.message);
      });
    });
  </script>

</html>
